version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODELS_DIR=/app/models
      - DEVICE=cpu
      - MAX_FILE_SIZE_MB=10
      - CONFIDENCE_FAKE_THRESHOLD=0.65
      - CONFIDENCE_REAL_THRESHOLD=0.35
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
